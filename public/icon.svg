<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b3a"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="innerGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(88,166,255,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square with subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bgGrad)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#innerGlow)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Stylized "O" ring with gradient -->
  <circle cx="256" cy="268" r="135" fill="none" stroke="url(#ringGrad)" stroke-width="30" stroke-linecap="round" opacity="0.95"/>

  <!-- Gap in the O (top-right) -->
  <circle cx="256" cy="268" r="135" fill="none" stroke="url(#bgGrad)" stroke-width="36" stroke-dasharray="55 800" stroke-dashoffset="-38" transform="rotate(-50 256 268)"/>

  <!-- Constellation lines (subtle connections) -->
  <g opacity="0.25" stroke="#bc8cff" stroke-width="1.2" stroke-linecap="round">
    <line x1="180" y1="194" x2="224" y2="268"/>
    <line x1="224" y1="268" x2="256" y2="260"/>
    <line x1="256" y1="260" x2="288" y2="268"/>
    <line x1="288" y1="268" x2="338" y2="348"/>
    <line x1="346" y1="180" x2="288" y2="268"/>
    <line x1="180" y1="194" x2="346" y2="180"/>
    <line x1="166" y1="358" x2="224" y2="268"/>
    <line x1="166" y1="358" x2="338" y2="348"/>
  </g>

  <!-- Constellation stars -->
  <!-- Betelgeuse - top right, in the gap (brightest) -->
  <circle cx="346" cy="180" r="10" fill="url(#starGrad)" filter="url(#starGlow)"/>

  <!-- Rigel - bottom left (bright) -->
  <circle cx="166" cy="358" r="8" fill="url(#starGrad)" filter="url(#starGlow)"/>

  <!-- Bellatrix - top left -->
  <circle cx="180" cy="194" r="6" fill="url(#starGrad)" filter="url(#glow)" opacity="0.9"/>

  <!-- Saiph - bottom right -->
  <circle cx="338" cy="348" r="6" fill="url(#starGrad)" filter="url(#glow)" opacity="0.9"/>

  <!-- Belt stars (three in a row, center) -->
  <circle cx="224" cy="268" r="4.5" fill="#ffffff" filter="url(#glow)" opacity="0.85"/>
  <circle cx="256" cy="260" r="5.5" fill="#ffffff" filter="url(#glow)" opacity="0.95"/>
  <circle cx="288" cy="268" r="4.5" fill="#ffffff" filter="url(#glow)" opacity="0.85"/>

  <!-- Ambient stars (depth) -->
  <circle cx="110" cy="110" r="1.8" fill="#c9d1d9" opacity="0.4"/>
  <circle cx="405" cy="95" r="2.2" fill="#c9d1d9" opacity="0.35"/>
  <circle cx="395" cy="415" r="1.8" fill="#c9d1d9" opacity="0.3"/>
  <circle cx="95" cy="405" r="1.5" fill="#c9d1d9" opacity="0.25"/>
  <circle cx="305" cy="125" r="1.3" fill="#c9d1d9" opacity="0.3"/>
  <circle cx="435" cy="255" r="1.5" fill="#c9d1d9" opacity="0.2"/>
  <circle cx="75" cy="275" r="1.2" fill="#c9d1d9" opacity="0.25"/>
  <circle cx="200" cy="105" r="1" fill="#c9d1d9" opacity="0.2"/>
  <circle cx="360" cy="430" r="1.3" fill="#c9d1d9" opacity="0.22"/>
</svg>
